<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GA4 Analytics Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f0f2f5;
        color: #333;
        min-height: 100vh;
      }

      /* ヘッダー */
      header {
        background: #fff;
        border-bottom: 1px solid #e0e0e0;
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 {
        font-size: 20px;
        font-weight: 700;
        color: #1a73e8;
      }
      header p {
        font-size: 13px;
        color: #888;
        margin-top: 2px;
      }
      #user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
        color: #555;
      }
      #user-info img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
      }
      #btn-logout {
        padding: 6px 14px;
        border: 1px solid #ddd;
        border-radius: 6px;
        background: white;
        font-size: 13px;
        cursor: pointer;
        color: #555;
      }
      #btn-logout:hover {
        background: #f5f5f5;
      }

      /* ログイン画面 */
      #login-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: calc(100vh - 65px);
      }
      #login-screen .logo {
        font-size: 48px;
        margin-bottom: 16px;
      }
      #login-screen h2 {
        font-size: 24px;
        margin-bottom: 8px;
      }
      #login-screen p {
        font-size: 14px;
        color: #888;
        margin-bottom: 32px;
      }

      /* メインコンテンツ */
      #main {
        display: none;
        padding: 32px;
        max-width: 1200px;
        margin: 0 auto;
      }

      /* 日付フィルター */
      .date-filter {
        display: flex;
        align-items: center;
        gap: 12px;
        background: white;
        padding: 16px 24px;
        border-radius: 12px;
        margin-bottom: 28px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .date-filter label {
        font-size: 14px;
        color: #555;
        font-weight: 500;
      }
      .date-filter input[type="date"] {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 8px;
        font-size: 14px;
        color: #333;
      }
      .date-filter span {
        color: #999;
      }
      #btn-fetch {
        margin-left: auto;
        padding: 10px 24px;
        background: #1a73e8;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      #btn-fetch:hover {
        background: #1557b0;
      }
      #btn-fetch:disabled {
        background: #aaa;
        cursor: not-allowed;
      }

      /* KPIカード */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 28px;
      }
      .kpi-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .kpi-card .icon {
        font-size: 28px;
        margin-bottom: 12px;
      }
      .kpi-card .label {
        font-size: 13px;
        color: #888;
        margin-bottom: 6px;
      }
      .kpi-card .value {
        font-size: 32px;
        font-weight: 700;
        color: #1a1a1a;
      }
      .kpi-card .value.loading {
        font-size: 20px;
        color: #aaa;
      }

      /* チャートグリッド */
      .chart-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 28px;
      }
      .chart-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
      }
      .chart-card h3 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 20px;
        color: #444;
      }
      .chart-card.full {
        grid-column: 1 / -1;
      }

      /* ローディング */
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid #e0e0e0;
        border-top-color: #1a73e8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* エラー */
      .error-box {
        background: #fce8e6;
        border: 1px solid #f5c6c2;
        color: #c62828;
        padding: 12px 16px;
        border-radius: 8px;
        font-size: 14px;
        margin-bottom: 20px;
        display: none;
      }

      @media (max-width: 768px) {
        .kpi-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .chart-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>📊 GA4 Analytics Dashboard</h1>
        <p>big-query-sample-492309 / analytics_324810718</p>
      </div>
      <div id="user-info" style="display: none">
        <img id="user-avatar" src="" alt="" />
        <span id="user-name"></span>
        <button id="btn-logout" onclick="logout()">ログアウト</button>
      </div>
    </header>

    <!-- ログイン画面 -->
    <div id="login-screen">
      <div class="logo">📊</div>
      <h2>GA4 Analytics Dashboard</h2>
      <p>BigQueryのGA4データをGoogleアカウントで表示します</p>
      <div
        id="g_id_onload"
        data-client_id="973636857836-8j3p9s89jknl45nsu7459np3gnsudev7.apps.googleusercontent.com"
        data-callback="onSignIn"
        data-auto_prompt="false"
      ></div>
      <div
        class="g_id_signin"
        data-type="standard"
        data-size="large"
        data-theme="outline"
        data-text="signin_with"
        data-locale="ja"
      ></div>
    </div>

    <!-- メインコンテンツ -->
    <div id="main">
      <div class="error-box" id="error-box"></div>

      <!-- 日付フィルター -->
      <div class="date-filter">
        <label>期間</label>
        <input type="date" id="date-from" />
        <span>〜</span>
        <input type="date" id="date-to" />
        <button id="btn-fetch" onclick="fetchAll()">データ取得</button>
      </div>

      <!-- KPIカード -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="icon">👥</div>
          <div class="label">ユニークユーザー数</div>
          <div class="value loading" id="kpi-users">—</div>
        </div>
        <div class="kpi-card">
          <div class="icon">🔄</div>
          <div class="label">セッション数</div>
          <div class="value loading" id="kpi-sessions">—</div>
        </div>
        <div class="kpi-card">
          <div class="icon">📄</div>
          <div class="label">ページビュー数</div>
          <div class="value loading" id="kpi-pageviews">—</div>
        </div>
        <div class="kpi-card">
          <div class="icon">⚡</div>
          <div class="label">総イベント数</div>
          <div class="value loading" id="kpi-events">—</div>
        </div>
      </div>

      <!-- チャート -->
      <div class="chart-grid">
        <div class="chart-card full">
          <h3>📈 日別ページビュー数</h3>
          <canvas id="chart-daily-pv" height="80"></canvas>
        </div>
        <div class="chart-card">
          <h3>🎯 イベント別件数 TOP10</h3>
          <canvas id="chart-events" height="200"></canvas>
        </div>
        <div class="chart-card">
          <h3>📱 日別ユニークユーザー</h3>
          <canvas id="chart-daily-users" height="200"></canvas>
        </div>
      </div>
    </div>

    <script>
      const PROJECT_ID = "big-query-sample-492309";
      const DATASET = "analytics_324810718";
      const SCOPE = "https://www.googleapis.com/auth/bigquery.readonly";

      let accessToken = null;
      let chartDailyPV = null,
        chartEvents = null,
        chartDailyUsers = null;

      // ──────────────────────────────
      // 認証
      // ──────────────────────────────
      function onSignIn(credential) {
        // IDトークンをデコードしてユーザー情報取得
        const payload = JSON.parse(atob(credential.credential.split(".")[1]));
        document.getElementById("user-avatar").src = payload.picture;
        document.getElementById("user-name").textContent = payload.name;
        document.getElementById("user-info").style.display = "flex";

        // アクセストークン（BigQuery呼び出し用）をOAuth2で取得
        const client = google.accounts.oauth2.initTokenClient({
          client_id:
            "973636857836-8j3p9s89jknl45nsu7459np3gnsudev7.apps.googleusercontent.com",
          scope: SCOPE,
          callback: (resp) => {
            if (resp.error) {
              showError("認証エラー: " + resp.error);
              return;
            }
            accessToken = resp.access_token;
            document.getElementById("login-screen").style.display = "none";
            document.getElementById("main").style.display = "block";
            setDefaultDates();
            fetchAll();
          },
        });
        client.requestAccessToken();
      }

      function logout() {
        google.accounts.id.disableAutoSelect();
        accessToken = null;
        document.getElementById("login-screen").style.display = "flex";
        document.getElementById("main").style.display = "none";
        document.getElementById("user-info").style.display = "none";
        resetKPIs();
      }

      // ──────────────────────────────
      // 日付初期値（直近7日）
      // ──────────────────────────────
      function setDefaultDates() {
        const today = new Date();
        const weekAgo = new Date(today);
        weekAgo.setDate(today.getDate() - 6);
        document.getElementById("date-to").value = formatDate(today);
        document.getElementById("date-from").value = formatDate(weekAgo);
      }

      function formatDate(d) {
        return d.toISOString().slice(0, 10);
      }

      function toSuffix(dateStr) {
        return dateStr.replace(/-/g, ""); // "2026-04-01" → "20260401"
      }

      // ──────────────────────────────
      // BigQuery クエリ実行
      // ──────────────────────────────
      async function runQuery(sql) {
        const url = `https://bigquery.googleapis.com/bigquery/v2/projects/${PROJECT_ID}/queries`;
        const res = await fetch(url, {
          method: "POST",
          headers: {
            Authorization: "Bearer " + accessToken,
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            query: sql,
            useLegacySql: false,
            timeoutMs: 30000,
          }),
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.error?.message || "BigQueryエラー");
        }
        return await res.json();
      }

      // ──────────────────────────────
      // 全データ取得
      // ──────────────────────────────
      async function fetchAll() {
        const from = document.getElementById("date-from").value;
        const to = document.getElementById("date-to").value;
        if (!from || !to) {
          showError("日付を指定してください");
          return;
        }

        const suffixFrom = toSuffix(from);
        const suffixTo = toSuffix(to);
        const tableExpr = `\`${PROJECT_ID}.${DATASET}.events_*\``;
        const tableFilter = `_TABLE_SUFFIX BETWEEN '${suffixFrom}' AND '${suffixTo}'`;

        document.getElementById("btn-fetch").disabled = true;
        document.getElementById("btn-fetch").innerHTML =
          '<span class="spinner"></span>取得中...';
        hideError();
        resetKPIs();

        try {
          await Promise.all([
            fetchKPIs(tableExpr, tableFilter),
            fetchDailyPV(tableExpr, tableFilter),
            fetchEventCounts(tableExpr, tableFilter),
            fetchDailyUsers(tableExpr, tableFilter),
          ]);
        } catch (e) {
          showError("データ取得エラー: " + e.message);
        } finally {
          document.getElementById("btn-fetch").disabled = false;
          document.getElementById("btn-fetch").textContent = "データ取得";
        }
      }

      // KPI集計
      async function fetchKPIs(table, filter) {
        const sql = `
      SELECT
        COUNT(DISTINCT user_pseudo_id) AS users,
        COUNT(DISTINCT CONCAT(user_pseudo_id,
          CAST((SELECT ep.value.int_value FROM UNNEST(event_params) ep WHERE ep.key = 'ga_session_id') AS STRING)
        )) AS sessions,
        COUNTIF(event_name = 'page_view') AS pageviews,
        COUNT(*) AS total_events
      FROM ${table}
      WHERE ${filter}
    `;
        const data = await runQuery(sql);
        const row = data.rows?.[0]?.f || [];
        document.getElementById("kpi-users").textContent = Number(
          row[0]?.v || 0,
        ).toLocaleString();
        document.getElementById("kpi-sessions").textContent = Number(
          row[1]?.v || 0,
        ).toLocaleString();
        document.getElementById("kpi-pageviews").textContent = Number(
          row[2]?.v || 0,
        ).toLocaleString();
        document.getElementById("kpi-events").textContent = Number(
          row[3]?.v || 0,
        ).toLocaleString();
        document
          .querySelectorAll(".kpi-card .value")
          .forEach((el) => el.classList.remove("loading"));
      }

      // 日別PV
      async function fetchDailyPV(table, filter) {
        const sql = `
      SELECT event_date, COUNT(*) AS pv
      FROM ${table}
      WHERE ${filter} AND event_name = 'page_view'
      GROUP BY event_date ORDER BY event_date
    `;
        const data = await runQuery(sql);
        const rows = data.rows || [];
        const labels = rows.map((r) =>
          r.f[0].v.replace(/(\d{4})(\d{2})(\d{2})/, "$1/$2/$3"),
        );
        const values = rows.map((r) => Number(r.f[1].v));
        renderLine(
          "chart-daily-pv",
          chartDailyPV,
          labels,
          values,
          "ページビュー",
          "#1a73e8",
          (c) => (chartDailyPV = c),
        );
      }

      // イベント別件数
      async function fetchEventCounts(table, filter) {
        const sql = `
      SELECT event_name, COUNT(*) AS cnt
      FROM ${table}
      WHERE ${filter}
      GROUP BY event_name ORDER BY cnt DESC LIMIT 10
    `;
        const data = await runQuery(sql);
        const rows = data.rows || [];
        const labels = rows.map((r) => r.f[0].v);
        const values = rows.map((r) => Number(r.f[1].v));
        renderBar(
          "chart-events",
          chartEvents,
          labels,
          values,
          (c) => (chartEvents = c),
        );
      }

      // 日別ユーザー
      async function fetchDailyUsers(table, filter) {
        const sql = `
      SELECT event_date, COUNT(DISTINCT user_pseudo_id) AS users
      FROM ${table}
      WHERE ${filter}
      GROUP BY event_date ORDER BY event_date
    `;
        const data = await runQuery(sql);
        const rows = data.rows || [];
        const labels = rows.map((r) =>
          r.f[0].v.replace(/(\d{4})(\d{2})(\d{2})/, "$1/$2/$3"),
        );
        const values = rows.map((r) => Number(r.f[1].v));
        renderLine(
          "chart-daily-users",
          chartDailyUsers,
          labels,
          values,
          "ユーザー数",
          "#34a853",
          (c) => (chartDailyUsers = c),
        );
      }

      // ──────────────────────────────
      // チャート描画
      // ──────────────────────────────
      function renderLine(id, existing, labels, data, label, color, setter) {
        if (existing) existing.destroy();
        const ctx = document.getElementById(id).getContext("2d");
        setter(
          new Chart(ctx, {
            type: "line",
            data: {
              labels,
              datasets: [
                {
                  label,
                  data,
                  borderColor: color,
                  backgroundColor: color + "20",
                  borderWidth: 2,
                  pointRadius: 4,
                  fill: true,
                  tension: 0.3,
                },
              ],
            },
            options: {
              responsive: true,
              plugins: { legend: { display: false } },
              scales: {
                y: { beginAtZero: true, ticks: { precision: 0 } },
              },
            },
          }),
        );
      }

      function renderBar(id, existing, labels, data, setter) {
        if (existing) existing.destroy();
        const ctx = document.getElementById(id).getContext("2d");
        const colors = [
          "#1a73e8",
          "#34a853",
          "#fbbc04",
          "#ea4335",
          "#9c27b0",
          "#00bcd4",
          "#ff9800",
          "#795548",
          "#607d8b",
          "#e91e63",
        ];
        setter(
          new Chart(ctx, {
            type: "bar",
            data: {
              labels,
              datasets: [
                {
                  data,
                  backgroundColor: colors.slice(0, data.length),
                  borderRadius: 6,
                },
              ],
            },
            options: {
              indexAxis: "y",
              responsive: true,
              plugins: { legend: { display: false } },
              scales: {
                x: { beginAtZero: true, ticks: { precision: 0 } },
              },
            },
          }),
        );
      }

      // ──────────────────────────────
      // ユーティリティ
      // ──────────────────────────────
      function resetKPIs() {
        ["kpi-users", "kpi-sessions", "kpi-pageviews", "kpi-events"].forEach(
          (id) => {
            const el = document.getElementById(id);
            el.textContent = "—";
            el.classList.add("loading");
          },
        );
      }

      function showError(msg) {
        const box = document.getElementById("error-box");
        box.textContent = msg;
        box.style.display = "block";
      }

      function hideError() {
        document.getElementById("error-box").style.display = "none";
      }
    </script>
  </body>
</html>
